# Services only. Infra (db/broker/redis/etc.) lives in compose.infra.yml
name: enma

services:
  api-gateway:
    build:
      context: ../..
      dockerfile: backend/services/api-gateway/src/Enma.ApiGateway.Api/Dockerfile
    container_name: enma-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      admin:
        condition: service_started
      analytics:
        condition: service_started

  sdk-api-gateway:
    build:
      context: ../..
      dockerfile: backend/services/api-gateway/src/Enma.ApiGateway.Sdk.Api/Dockerfile
    container_name: enma-sdk-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AdminGrpc__Address=${ADMIN_GRPC_ADDRESS}
      - AdminGrpc__DeadlineMs=${ADMIN_GRPC_DEADLINE_MS}
      - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
      - Redis__KeyPrefix=${SDK_GW_REDIS_KEY_PREFIX}
      - Redis__Database=${SDK_GW_REDIS_DATABASE}
      - SdkAuth__CacheTtlMinutes=${SDK_AUTH_CACHE_TTL_MINUTES}
    ports:
      - "8090:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      ingest:
        condition: service_started
      admin:
        condition: service_started
      redis:
        condition: service_healthy

  analytics:
    build:
      context: ../..
      dockerfile: backend/services/analytics/src/Enma.Analytics.Api/Dockerfile
    container_name: enma-analytics
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDb__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDb__DatabaseName=${MONGO_DB}
      - ClickHouse__ConnectionString=Host=${CLICKHOUSE_HOST};Protocol=http;Port=${CLICKHOUSE_HTTP_PORT};Database=${CLICKHOUSE_DB};Username=${CLICKHOUSE_USER};Password=${CLICKHOUSE_PASSWORD}
      - ClickHouse__CommandTimeoutSeconds=${CLICKHOUSE_COMMAND_TIMEOUT}
      - Jwt__SecretKey=${AUTH_JWT_SECRET}
    ports:
      - "8081:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  auth:
    build:
      context: ../..
      dockerfile: backend/services/auth/src/Enma.Auth.Api/Dockerfile
    container_name: enma-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - Postgres__ConnectionString=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=enma_auth;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

      - Jwt__SecretKey=${AUTH_JWT_SECRET}
      - Jwt__ExpiresMinutes=${JWT_EXPIRES_MINUTES}

      - Auth__RefreshTokenLifetimeDays=${AUTH_REFRESH_TOKEN_LIFETIME_DAYS}
      - Auth__StateCacheTtlMinutes=${AUTH_STATE_CACHE_TTL_MINUTES}
      - Auth__RedirectBaseAddress=${AUTH_REDIRECT_BASE_ADDRESS}

      - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
      - Redis__KeyPrefix=${REDIS_KEY_PREFIX}
      - Redis__Database=${REDIS_DATABASE}

      - GoogleProvider__BaseAddress=${GOOGLE_BASE_ADDRESS}
      - GoogleProvider__TimeoutSeconds=${GOOGLE_TIMEOUT_SECONDS}
      - GoogleProvider__ClientId=${GOOGLE_CLIENT_ID}
      - GoogleProvider__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - GoogleProvider__RedirectUrl=${AUTH_GOOGLE_REDIRECT_URL}
      - GoogleProvider__RequireEmailVerified=${GOOGLE_REQUIRE_EMAIL_VERIFIED}
      - GoogleProvider__ClockSkewSeconds=${GOOGLE_CLOCK_SKEW_SECONDS}

      - AdminGrpc__Address=${ADMIN_GRPC_ADDRESS}
      - AdminGrpc__DeadlineMs=${ADMIN_GRPC_DEADLINE_MS}

      - SuperAdmin__EmailsRaw=${SUPER_ADMIN_EMAILS}
    ports:
      - "8082:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      admin:
        condition: service_started

  ingest:
    build:
      context: ../..
      dockerfile: backend/services/ingest/src/Enma.Ingest.Api/Dockerfile
    container_name: enma-ingest
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__ConnectionString=${RABBITMQ_URI}
    ports:
      - "8083:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy

  admin:
    build:
      context: ../..
      dockerfile: backend/services/admin/src/Enma.Admin.Api/Dockerfile
    container_name: enma-admin
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - Jwt__SecretKey=${AUTH_JWT_SECRET}
      - Jwt__ExpiresMinutes=${JWT_EXPIRES_MINUTES}

      - Security__ApiKeyPepper=${API_KEY_PEPPER}
      - Postgres__ConnectionString=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=enma_admin;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

      - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
      - Redis__KeyPrefix=${ADMIN_REDIS_KEY_PREFIX}
      - Redis__Database=${ADMIN_REDIS_DATABASE}
    ports:
      - "8084:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bucket-builder:
    build:
      context: ../..
      dockerfile: backend/services/bucket-builder/src/Enma.BucketBuilder.Worker/Dockerfile
    container_name: enma-bucket-builder
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ClickHouse__ConnectionString=Host=${CLICKHOUSE_HOST};Protocol=http;Port=${CLICKHOUSE_HTTP_PORT};Database=${CLICKHOUSE_DB};Username=${CLICKHOUSE_USER};Password=${CLICKHOUSE_PASSWORD}
      - ClickHouse__CommandTimeoutSeconds=${CLICKHOUSE_COMMAND_TIMEOUT}
      - MongoDb__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDb__DatabaseName=${MONGO_DB}
      - BucketBuilder__PollIntervalSeconds=${BB_POLL_INTERVAL_SECONDS}
      - BucketBuilder__SafetyLagSeconds=${BB_SAFETY_LAG_SECONDS}
      - BucketBuilder__MaxWindowsPerTick=${BB_MAX_WINDOWS_PER_TICK}
      - BucketBuilder__LeaseTimeoutSeconds=${BB_LEASE_TIMEOUT_SECONDS}
      - BucketBuilder__Pipeline=${BB_PIPELINE}
      - BucketBuilder__ShardIndex=${BB_SHARD_INDEX}
      - BucketBuilder__ShardCount=${BB_SHARD_COUNT}
      - BucketBuilder__InitialLookbackHours=${BB_INITIAL_LOOKBACK_HOURS}
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      mongo:
        condition: service_healthy

  event-processor:
    build:
      context: ../..
      dockerfile: backend/services/event-processor/src/Enma.EventProcessor.Worker/Dockerfile
    container_name: enma-event-processor
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__ConnectionString=${RABBITMQ_URI}
      - ClickHouse__ConnectionString=Host=${CLICKHOUSE_HOST};Protocol=http;Port=${CLICKHOUSE_HTTP_PORT};Database=${CLICKHOUSE_DB};Username=${CLICKHOUSE_USER};Password=${CLICKHOUSE_PASSWORD};JsonWriteMode=Binary
      - ClickHouse__ApplyMigrationsOnStartup=${CLICKHOUSE_APPLY_MIGRATIONS}
      - ClickHouse__CommandTimeoutSeconds=${CLICKHOUSE_COMMAND_TIMEOUT}
      - EventProcessor__RabbitMq__EndpointName=${EP_RABBITMQ_ENDPOINT_NAME}
      - EventProcessor__RabbitMq__PrefetchCount=${EP_RABBITMQ_PREFETCH_COUNT}
      - EventProcessor__RabbitMq__BatchMessageLimit=${EP_RABBITMQ_BATCH_MESSAGE_LIMIT}
      - EventProcessor__RabbitMq__BatchTimeLimitSeconds=${EP_RABBITMQ_BATCH_TIME_LIMIT_SECONDS}
      - EventProcessor__RabbitMq__BatchConcurrencyLimit=${EP_RABBITMQ_BATCH_CONCURRENCY_LIMIT}
      - EventProcessor__RabbitMq__RetryCount=${EP_RABBITMQ_RETRY_COUNT}
      - EventProcessor__RabbitMq__RetryIntervalSeconds=${EP_RABBITMQ_RETRY_INTERVAL_SECONDS}
      - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
      - Redis__KeyPrefix=${EP_REDIS_KEY_PREFIX}
      - Redis__Database=${EP_REDIS_DATABASE}
      - AdminGrpc__Address=${ADMIN_GRPC_ADDRESS}
      - AdminGrpc__DeadlineMs=${ADMIN_GRPC_DEADLINE_MS}
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      admin:
        condition: service_started

networks:
  enma:
    name: enma-net
    driver: bridge
