# Services only. Infra (db/broker/redis/etc.) lives in compose.infra.yml
name: enma

services:
  api-gateway:
    build:
      context: ../..
      dockerfile: backend/services/api-gateway/src/Enma.ApiGateway.Api/Dockerfile
    container_name: enma-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8080:8080"
    networks:
      - enma
    restart: unless-stopped
    
  sdk-api-gateway:
    build:
      context: ../..
      dockerfile: backend/services/api-gateway/src/Enma.ApiGateway.Sdk.Api/Dockerfile
    container_name: enma-sdk-api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8090:8080"
    networks:
      - enma
    restart: unless-stopped

  analytics:
    build:
      context: ../..
      dockerfile: backend/services/analytics/src/Enma.Analytics.Api/Dockerfile
    container_name: enma-analytics
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8081:8080"
    networks:
      - enma
    restart: unless-stopped

  auth:
    build:
      context: ../..
      dockerfile: backend/services/auth/src/Enma.Auth.Api/Dockerfile
    container_name: enma-auth
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - Postgres__ConnectionString=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=enma_auth;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

      - Jwt__SecretKey=${AUTH_JWT_SECRET}
      - Jwt__ExpiresMinutes=10

      - GoogleProvider__BaseAddress=https://oauth2.googleapis.com/
      - GoogleProvider__TimeoutSeconds=10
      - GoogleProvider__ClientId=${GOOGLE_CLIENT_ID}
      - GoogleProvider__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - GoogleProvider__RedirectUrl=${AUTH_GOOGLE_REDIRECT_URL}
      - GoogleProvider__RequireEmailVerified=true
      - GoogleProvider__ClockSkewSeconds=60

      - AdminGrpc__Address=http://admin:8081
      - AdminGrpc__DeadlineMs=3000
    ports:
      - "8082:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      admin:
        condition: service_started

  ingest:
    build:
      context: ../..
      dockerfile: backend/services/ingest/src/Enma.Ingest.Api/Dockerfile
    container_name: enma-ingest
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8083:8080"
    networks:
      - enma
    restart: unless-stopped

  admin:
    build:
      context: ../..
      dockerfile: backend/services/admin/src/Enma.Admin.Api/Dockerfile
    container_name: enma-admin
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - Security__ApiKeyPepper=${API_KEY_PEPPER}
      - Postgres__ConnectionString=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=enma_admin;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "8084:8080"
    networks:
      - enma
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  bucket-builder:
    build:
      context: ../..
      dockerfile: backend/services/bucket-builder/src/Enma.BucketBuilder.Worker/Dockerfile
    container_name: enma-bucket-builder
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - enma
    restart: unless-stopped

  event-processor:
    build:
      context: ../..
      dockerfile: backend/services/event-processor/src/Enma.EventProcessor.Worker/Dockerfile
    container_name: enma-event-processor
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - enma
    restart: unless-stopped

networks:
  enma:
    name: enma-net
    driver: bridge
