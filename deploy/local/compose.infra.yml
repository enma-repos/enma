# Infra only: databases, cache, broker.
name: enma

services:
  postgres:
    image: postgres:17
    container_name: enma-postgres
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - enma-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - enma
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: enma-clickhouse
    environment:
      CLICKHOUSE_DB: enma
      CLICKHOUSE_USER: enma
      CLICKHOUSE_PASSWORD: enma
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - enma-clickhouse-data:/var/lib/clickhouse
      - enma-clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - enma
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: enma-mongo
    environment:
      MONGO_INITDB_DATABASE: enma
      MONGO_INITDB_ROOT_USERNAME: enma
      MONGO_INITDB_ROOT_PASSWORD: enma
    ports:
      - "27017:27017"
    volumes:
      - enma-mongo-data:/data/db
      - enma-mongo-config:/data/configdb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' localhost:27017 | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - enma
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: enma-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - enma-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - enma
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: enma-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: enma
      RABBITMQ_DEFAULT_PASS: enma
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - enma-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - enma
    restart: unless-stopped

volumes:
  enma-postgres-data:
  enma-clickhouse-data:
  enma-clickhouse-logs:
  enma-mongo-data:
  enma-mongo-config:
  enma-redis-data:
  enma-rabbitmq-data:

networks:
  enma:
    name: enma-net
    driver: bridge